<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Fuel Cell - Speaking Flashcards</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --accent: #e8c97a; --accent2: #7ab8e8; --text: #f0ece0; --muted: #7a7d8f; --border: rgba(255,255,255,0.07); --radius: 16px; }
body { font-family: Georgia, serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
header { text-align: center; margin-bottom: 2rem; }
header .label { font-family: Arial, sans-serif; font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
header h1 { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 400; color: var(--text); line-height: 1.2; }
.progress-bar-wrap { width: 100%; max-width: 560px; margin-bottom: 1.2rem; }
.progress-info { display: flex; justify-content: space-between; font-family: Arial, sans-serif; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.progress-bar { height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
.number-row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-width: 560px; margin-bottom: 1.2rem; }
.num-dot { width: 28px; height: 28px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); font-family: Arial, sans-serif; font-size: 11px; color: var(--muted); display: flex; align-items: center; justify-content: center; cursor: pointer; }
.num-dot.active { background: var(--accent); color: #1a1506; border-color: transparent; font-weight: 700; }
.num-dot.seen { border-color: rgba(232,201,122,0.35); color: var(--accent); }
.card-scene { width: 100%; max-width: 560px; height: 300px; perspective: 1200px; cursor: pointer; margin-bottom: 1.2rem; }
.card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(.4,0,.2,1); }
.card.flipped { transform: rotateY(180deg); }
.card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: var(--radius); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem 1.8rem; text-align: center; }
.card-front { background: var(--surface); border: 1px solid var(--border); }
.card-back { background: var(--surface2); border: 1px solid rgba(232,201,122,0.15); transform: rotateY(180deg); }
.card-tag { font-family: Arial, sans-serif; font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 1rem; }
.card-front .card-tag { color: var(--accent2); }
.card-back .card-tag { color: var(--accent); }
.card-question { font-size: clamp(1rem, 2.5vw, 1.3rem); font-weight: 400; line-height: 1.5; color: var(--text); }
.card-answer { font-family: Arial, sans-serif; font-size: 0.9rem; line-height: 1.7; color: var(--text); }
.card-answer strong { color: var(--accent); }
.flip-hint { font-family: Arial, sans-serif; font-size: 11px; color: var(--muted); margin-top: 1.2rem; }
.controls { display: flex; gap: 10px; width: 100%; max-width: 560px; }
.btn { flex: 1; padding: 14px; border: none; border-radius: 10px; font-family: Arial, sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }
.btn-prev { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
.btn-next { background: var(--accent); color: #1a1506; flex: 2; }
.btn-flip { background: var(--surface2); color: var(--text); border: 1px solid rgba(122,184,232,0.2); flex: 2; }
.btn:disabled { opacity: 0.3; cursor: default; }
.done-screen { display: none; flex-direction: column; align-items: center; text-align: center; max-width: 400px; gap: 1rem; }
.done-screen h2 { font-size: 1.8rem; font-weight: 400; }
.done-screen p { font-family: Arial, sans-serif; color: var(--muted); font-size: 14px; line-height: 1.6; }
.btn-restart { margin-top: 0.5rem; padding: 14px 32px; background: var(--accent); color: #1a1506; border: none; border-radius: 10px; font-family: Arial, sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<header>
  <div class="label">Electrical Energy &middot; Unit 1</div>
  <h1>The Fuel Cell</h1>
</header>
<div class="progress-bar-wrap">
  <div class="progress-info"><span id="prog-text">Card 1 of 9</span><span id="prog-pct">0%</span></div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>
<div class="number-row" id="num-row"></div>
<div class="card-scene" id="card-scene" onclick="flipCard()">
  <div class="card" id="card">
    <div class="card-face card-front">
      <div class="card-tag">Question &mdash; speak your answer</div>
      <div class="card-question" id="q-text"></div>
      <div class="flip-hint">&#8635; tap card to reveal answer</div>
    </div>
    <div class="card-face card-back">
      <div class="card-tag">Model answer</div>
      <div class="card-answer" id="a-text"></div>
    </div>
  </div>
</div>
<div class="controls">
  <button class="btn btn-prev" id="btn-prev" onclick="go(-1)">&#8592; Back</button>
  <button class="btn btn-flip" onclick="flipCard()">Flip card</button>
  <button class="btn btn-next" id="btn-next" onclick="go(1)">Next &#8594;</button>
</div>
<div class="done-screen" id="done-screen">
  <div style="font-size:2.5rem">&#10003;</div>
  <h2>All done!</h2>
  <p>You have been through all the questions. Go back and review any cards you found difficult.</p>
  <button class="btn-restart" onclick="restart()">Start again</button>
</div>
<script>
var cards = [
  { "q": 'What is a fuel cell?', "a": 'A fuel cell is a device that <strong>creates an electric current from a chemical reaction</strong>. Unlike a battery, it never needs to be recharged as long as there is a supply of fuel.' },
  { "q": 'What fuel does a fuel cell use?', "a": 'A fuel cell uses <strong>hydrogen</strong> as its fuel. It combines hydrogen with oxygen to produce electricity.' },
  { "q": 'What is the only waste product of a fuel cell?', "a": 'The only waste product of a fuel cell is <strong>water</strong>. It produces no pollution or greenhouse gases.' },
  { "q": 'How is a fuel cell similar to a battery? How is it different?', "a": 'Like a battery, a fuel cell <strong>creates an electric current from a chemical reaction</strong>. Unlike a battery, it <strong>never needs to be recharged</strong> as long as fuel is available.' },
  { "q": 'What are the two main problems with fuel cells?', "a": 'First, <strong>individual cells produce very little electricity</strong>, so many must be combined into a stack. Second, <strong>producing hydrogen fuel is expensive</strong> and currently relies mainly on natural gas.' },
  { "q": 'Why is hydrogen fuel a problem at the moment?', "a": 'At present, hydrogen is mainly produced from <strong>natural gas, which is expensive and produces carbon dioxide</strong> as a by-product. The ideal would be to extract it from plants or water.' },
  { "q": 'What is the ultimate goal for fuel cell technology?', "a": 'The ultimate goal is to <strong>extract hydrogen from plants or water</strong>, so that motors run on water and produce only water as a by-product.' },
  { "q": 'Where have fuel cells already been used successfully?', "a": 'Fuel cells have already been used in <strong>spaceships and electric cars</strong>.' },
  { "q": 'Why is there growing demand for fuel cell technology?', "a": 'Because of the <strong>growing demand for electric vehicles to replace cars with petrol engines</strong>.' }
];
var current = 0, seen = {}, flipped = false;
function render() {
  document.getElementById('q-text').innerHTML = cards[current].q;
  document.getElementById('a-text').innerHTML = cards[current].a;
  flipped = false;
  document.getElementById('card').classList.remove('flipped');
  seen[current] = true;
  var pct = Math.round((Object.keys(seen).length / cards.length) * 100);
  document.getElementById('prog-text').textContent = 'Card ' + (current + 1) + ' of ' + cards.length;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  var dots = document.querySelectorAll('.num-dot');
  for (var i = 0; i < dots.length; i++) {
    dots[i].classList.remove('active', 'seen');
    if (i === current) dots[i].classList.add('active');
    else if (seen[i]) dots[i].classList.add('seen');
  }
  document.getElementById('btn-prev').disabled = (current === 0);
  document.getElementById('btn-next').textContent = current === cards.length - 1 ? 'Finish' : 'Next \u2192';
}
function flipCard() { flipped = !flipped; document.getElementById('card').classList.toggle('flipped', flipped); }
function go(dir) {
  if (dir === 1 && current === cards.length - 1) { showDone(); return; }
  current = Math.max(0, Math.min(cards.length - 1, current + dir));
  render();
}
function showDone() {
  document.getElementById('card-scene').style.display = 'none';
  document.querySelector('.controls').style.display = 'none';
  document.getElementById('num-row').style.display = 'none';
  document.getElementById('done-screen').style.display = 'flex';
}
function restart() {
  current = 0; seen = {}; flipped = false;
  document.getElementById('card-scene').style.display = 'block';
  document.querySelector('.controls').style.display = 'flex';
  document.getElementById('num-row').style.display = 'flex';
  document.getElementById('done-screen').style.display = 'none';
  render();
}
var numRow = document.getElementById('num-row');
for (var i = 0; i < cards.length; i++) {
  (function(idx) {
    var d = document.createElement('div');
    d.className = 'num-dot';
    d.textContent = idx + 1;
    d.onclick = function(e) { e.stopPropagation(); current = idx; render(); };
    numRow.appendChild(d);
  })(i);
}
render();
</script>
</body>
</html>
